name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy
      - run: python -m pytest
      - run: python -m pip_audit --skip-editable

  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip wheel --no-deps --wheel-dir dist .
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: bring-shopping --help
      - run: python -c "import bring_shopping.mcp_server"

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: bring-shopping:test
      - run: docker run --rm bring-shopping:test bring-shopping --help

  deployment-scripts:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Validate Unix lifecycle scripts
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n deploy/*.sh
      - name: Parse Windows PowerShell lifecycle scripts
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $failed = $false
          Get-ChildItem deploy\*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($_.Extent.File): $($_.Message)" }
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
