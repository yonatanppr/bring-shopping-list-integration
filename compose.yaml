name: bring-shopping

services:
  tailscale:
    image: tailscale/tailscale:v1.98.9
    hostname: ${TAILSCALE_HOSTNAME:-bring-shopping}
    environment:
      TS_AUTH_ONCE: "true"
      TS_HOSTNAME: ${TAILSCALE_HOSTNAME:-bring-shopping}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
    volumes:
      - tailscale-state:/var/lib/tailscale
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 10s
      timeout: 5s
      retries: 12
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  app:
    image: ${BRING_SHOPPING_IMAGE:-ghcr.io/yonatanppr/bring-shopping-list-integration:1.1.0}
    build:
      context: .
    pull_policy: missing
    env_file:
      - path: .env
        required: true
    command: ["bring-shopping-mcp-http"]
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

volumes:
  tailscale-state:
