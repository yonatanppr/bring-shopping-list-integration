name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]' "build>=1.3,<2"
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy
      - run: python -m pytest
      - run: python -m pip_audit --skip-editable
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: bring-shopping --help
      - run: python -c "import bring_shopping.mcp_server"
      - run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
