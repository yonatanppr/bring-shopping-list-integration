repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check
        language: python
        additional_dependencies: ["ruff>=0.11,<1"]
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format --check
        language: python
        additional_dependencies: ["ruff>=0.11,<1"]
        types: [python]
      - id: mypy
        name: mypy
        entry: python -m mypy
        language: python
        additional_dependencies:
          - "aiohttp>=3.13,<4"
          - "bring-api==1.1.2"
          - "mcp>=1.27,<2"
          - "mypy>=1.15,<2"
          - "pydantic>=2.11,<3"
          - "python-dotenv>=1.0,<2"
          - "pytest>=9.0.3,<10"
        pass_filenames: false
        types: [python]
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: python
        additional_dependencies:
          - "aiohttp>=3.13,<4"
          - "bring-api==1.1.2"
          - "mcp>=1.27,<2"
          - "pydantic>=2.11,<3"
          - "python-dotenv>=1.0,<2"
          - "pytest>=9.0.3,<10"
          - "pytest-cov>=6,<8"
        pass_filenames: false
        always_run: true
