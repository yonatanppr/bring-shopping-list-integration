name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Verify tag matches project version
        run: |
          version="${GITHUB_REF_NAME#v}"
          python -c 'import sys, tomllib; expected=tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]; actual=sys.argv[1]; sys.exit(0 if actual == expected else f"tag version {actual} != project version {expected}")' "$version"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]' "build>=1.3,<2"
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy
      - run: python -m pytest
      - run: python -m pip_audit --skip-editable
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: bring-shopping --help
      - run: python -c "import bring_shopping.mcp_server"
      - run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  container:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive immutable image tags
        id: image
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/yonatanppr/bring-shopping-list-integration:${{ steps.image.outputs.version }}
            ghcr.io/yonatanppr/bring-shopping-list-integration:${{ github.ref_name }}
